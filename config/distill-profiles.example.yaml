profiles:
  - name: amazon_rtx5070ti_search
    shop: amazon
    product_hint: rtx-5070-ti
    strategy: distill_webhook
    interval_seconds: 15
    priority: tier_a
    url: https://www.amazon.de/s?k=rtx+5070+ti
    page_type: search
    recommended_watch_target: "erste 10-20 Suchkarten oder Ergebnisliste"
    fields:
      title: "Produktname pro Karte"
      price: "sichtbarer Endpreis"
      in_stock: "\"Auf Lager\" / Lieferstatus oder Buy-Box-Indikator"
      url: "Link auf Produktdetailseite"
    notes:
      - "Direkte HTTP-Requests liefern aktuell 503/Anti-Bot."
      - "Deshalb nur lokal im Browser mit Distill oder ähnlicher Erweiterung."

  - name: mindfactory_rtx5070ti_search
    shop: mindfactory
    product_hint: rtx-5070-ti
    strategy: http_or_distill
    interval_seconds: 20
    priority: tier_a
    url: https://www.mindfactory.de/search_result.php?search_query=rtx+5070+ti
    page_type: search
    recommended_watch_target: "Produktkacheln mit Titel, Preis, Lagerstatus"
    fields:
      title: ".pname"
      price: ".pprice"
      in_stock: ".pshipping span"
      url: "a.phover-complete-link"
    notes:
      - "Serverseitig parsebar, gut für direkten HTTP-Poller."
      - "Distill lokal ist trotzdem schneller, wenn du 10-20s willst."

  - name: alternate_rtx5070ti_search
