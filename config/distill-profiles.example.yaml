# Historische Referenz fuer Distill-Profile aus der Vor-JSON-Zeit.
# In der aktuellen App werden Distill-Snippets direkt im Control Center
# pro Tracker und Shop generiert.

profiles:
  - name: amazon_console_pro_search
    shop: amazon
    product_hint: console-pro
    strategy: distill_webhook
    interval_seconds: 15
    priority: tier_a
    url: https://www.amazon.de/s?k=console+pro
    page_type: search
    recommended_watch_target: "erste 10-20 Produktkarten der Suchseite"
    fields:
      title: "Produktname pro Karte"
      price: "sichtbarer Endpreis"
      in_stock: "Lagerstatus oder Buy-Box-Indikator"
      url: "Link auf Produktdetailseite"
    notes:
      - "Direkte HTTP-Requests liefern auf grossen Shops oft Anti-Bot- oder Challenge-Seiten."
      - "Deshalb lokal im Browser mit Distill ueberwachen."

  - name: mediamarkt_console_pro_search
    shop: mediamarkt
    product_hint: console-pro
    strategy: distill_webhook
    interval_seconds: 20
    priority: tier_a
    url: https://www.mediamarkt.de/de/search.html?query=console%20pro
    page_type: search
    recommended_watch_target: "gerenderte Suchtrefferliste"
    fields:
      title: "Produktname"
      price: "Preis"
      in_stock: "Lieferstatus"
      url: "Produktlink"

  - name: saturn_router_ax_search
    shop: saturn
    product_hint: router-ax
    strategy: distill_webhook
    interval_seconds: 20
    priority: tier_b
    url: https://www.saturn.de/de/search.html?query=router%20ax
    page_type: search
    recommended_watch_target: "Produktkarten mit Name, Preis und Lagerstatus"
    fields:
      title: "Produktname"
      price: "Preis"
      in_stock: "Verfuegbarkeit"
      url: "Produktlink"

  - name: asus_store_router_ax
    shop: asus-store
    product_hint: router-ax
    strategy: distill_webhook
    interval_seconds: 20
    priority: tier_b
    url: https://webshop.asus.com/de/
    page_type: search_or_category
    recommended_watch_target: "Suchergebnisse oder Router-Kategorie"
    fields:
      title: "Produktname"
      price: "Preis"
      in_stock: "Verfuegbarkeit"
      url: "Produktlink"
