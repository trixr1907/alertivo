    recommended_watch_target: "Produktkarten der Kategorie"
    fields:
      title: ".product-name"
      price: ".price"
      in_stock: ".delivery-info"
      url: "a.card.productBox"
    notes:
      - "Aktuell sehr gut serverseitig parsebar."
