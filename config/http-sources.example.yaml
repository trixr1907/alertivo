# Legacy-Referenz fuer fruehere HTTP-/Command-Collector-Setups.
# Neue Installationen sollten Tracker im Control Center anlegen.

database_path: data/alerts.sqlite
log_level: INFO
user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) Alertivo/0.1
enable_restock_alerts: true
new_listing_reference_min_age_seconds: 60

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}

discord:
  webhook_url: ${DISCORD_WEBHOOK_URL}

windows:
  enabled: true
  app_id: Alertivo

sound:
  enabled: true
  sound_file: ${ALERT_SOUND_FILE}

webhook:
  enabled: true
  host: 127.0.0.1
  port: 8787
  path: /webhook/distill
  token: ${WEBHOOK_TOKEN}

sources:
  - name: geizhals_console_pro_search
    type: http
    enabled: true
    url: https://geizhals.de/?fs=console+pro
    interval_seconds: 90
    timeout_seconds: 20
    shop: geizhals
    source: geizhals
    scope: aggregator
    product_hint: console-pro
    parser:
      mode: list
      item_selector: article
      title_selector: h3 a, h3
      price_selector: __self__
      price_regex: ab\s*€\s*([0-9\.\,]+)
      link_selector: h3 a

  - name: alternate_console_pro_search
    type: http
    enabled: true
    url: https://www.alternate.de/listing.xhtml?q=console+pro
    interval_seconds: 30
    timeout_seconds: 20
    shop: alternate
    source: shop
    scope: shop_search
    product_hint: console-pro
    parser:
      mode: list
      item_selector: a.card.productBox
      title_selector: .product-name
      price_selector: .price
      link_selector: ""
      stock_selector: .delivery-info
      stock_in_texts: ["Auf Lager", "lieferbar", "sofort"]
      stock_out_texts: ["nicht lieferbar", "ausverkauft", "derzeit nicht"]

  - name: mindfactory_router_ax_search
    type: command
    enabled: true
    url: https://www.mindfactory.de/search_result.php?search_query=router+ax
    command:
      - curl
      - -L
      - --silent
      - https://www.mindfactory.de/search_result.php?search_query=router+ax
    encoding: iso-8859-15
    interval_seconds: 30
    timeout_seconds: 20
    shop: mindfactory
    source: shop
    scope: shop_search
    product_hint: router-ax
    parser:
      mode: list
      item_selector: div.p
      title_selector: .pname
      price_selector: .pprice
      link_selector: "a.phover-complete-link, a.p-complete-link"
      stock_selector: ".pshipping span"
      stock_in_texts: ["Lagernd", "lagernd", "Sofort"]
      stock_out_texts: ["nicht lagernd", "nicht verfuegbar", "ausverkauft"]
