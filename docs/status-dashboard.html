<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alertivo Status Dashboard Einstieg</title>
  <style>
    :root {
      --bg: #060b14;
      --panel: rgba(15, 24, 40, 0.95);
      --line: #243a58;
      --text: #eef4ff;
      --muted: #9eb3d0;
      --accent: #63c8ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Rajdhani", "Bahnschrift", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, rgba(99,200,255,0.22), transparent 30%),
        linear-gradient(180deg, #050911 0%, #091221 100%);
    }
    .card {
      width: min(720px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 24px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
    }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 46px); text-transform: uppercase; letter-spacing: 0.03em; }
    p { margin: 12px 0 0; color: var(--muted); line-height: 1.45; font-size: 18px; }
    .actions { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      padding: 10px 16px;
      font-size: 16px;
      transition: transform 120ms ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.primary {
      background: linear-gradient(180deg, #1e92ff, #1569cb);
      border-color: #1f78d5;
    }
    .brand {
      margin-top: 14px;
      font-size: 13px;
      color: #b9cde9;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .brand a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Alertivo Dashboard</h1>
    <p>Diese Seite dient als Einstieg. Das Live-Dashboard laeuft lokal im Alertivo Control Center.</p>
    <div class="actions">
      <a class="btn primary" href="http://127.0.0.1:8787/control-center">Zum Live Control Center</a>
      <a class="btn" href="http://127.0.0.1:8787/status-dashboard">Lokaler Redirect-Test</a>
    </div>
    <div class="brand">dev by Ivo &bull; <a href="http://ivo-tech.com" target="_blank" rel="noreferrer">ivo-tech.com</a></div>
  </main>
  <script>
    setTimeout(() => {
      if (window.location.protocol.startsWith("http")) {
        window.location.href = "/control-center";
      }
    }, 1200);
  </script>
</body>
</html>
